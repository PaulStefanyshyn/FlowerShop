<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Отримані дані</h1>

    {% if product %}
    <p>Назва: {{ product.name }}</p>
    <p>Вартість: {{ product.price }}</p>
    <p>Кількість: {{ product.count }}</p>
    {% else %}
    <p>Дані не передані</p>
    {% endif %}
</body>
</html>

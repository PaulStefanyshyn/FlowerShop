<!DOCTYPE html>
<html>
<head>
    <title>Редагувати букет</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>Редагування: {{ flower.name }}</h2>
    <form method="post" enctype="multipart/form-data">
        <div class="mb-3">
            <label>Назва</label>
            <input type="text" name="name" class="form-control" value="{{ flower.name }}" required>
        </div>
        <div class="mb-3">
            <label>Ціна (грн)</label>
            <input type="number" name="price" class="form-control" value="{{ flower.price }}">
        </div>
        <div class="mb-3">
            <label>Теги</label>
            <input type="text" name="tags" class="form-control" value="{{ flower.tags }}">
        </div>
        <div class="mb-3">
            <label>Опис</label>
            <textarea name="description" class="form-control" rows="4">{{ flower.description }}</textarea>
        </div>
        
        <h5>Поточні фото</h5>
        <div class="row mb-3">
            {% for img in flower.images %}
            <div class="col-md-3 mb-2">
                <img src="{{ url_for('static', filename=img.imgPath) }}" class="img-fluid rounded" style="height: 100px; object-fit: cover;">
                <br>
                <a href="{{ url_for('delete_image', image_id=img.id) }}" class="btn btn-sm btn-danger mt-1" onclick="return confirm('Видалити фото?')">Видалити</a>
            </div>
            {% endfor %}
        </div>
        
        <div class="mb-3">
            <label>Додати нові фото (можна декілька)</label>
            <input type="file" name="new_images" class="form-control" multiple accept="image/*">
        </div>
        
        <button type="submit" class="btn btn-primary">Оновити</button>
        <a href="{{ url_for('admin_index') }}" class="btn btn-secondary">Назад</a>
    </form>
</div>
</body>
</html>
